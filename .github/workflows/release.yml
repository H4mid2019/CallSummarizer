name: Release

# Builds signed phone + watch APKs and attaches them to a GitHub Release.
# Trigger: push a tag like `v1.0.0`, or run manually (manual runs only upload artifacts).
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   KEYSTORE_BASE64   base64 of vocalis-release.jks  (PowerShell:
#                       [Convert]::ToBase64String([IO.File]::ReadAllBytes("vocalis-release.jks")))
#   KEYSTORE_PASSWORD store password  (see keystore.properties)
#   KEY_ALIAS         vocalis
#   KEY_PASSWORD      key password     (see keystore.properties)

on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish signed APKs
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Stub local.properties
        run: |
          if [ ! -f local.properties ]; then
            echo "# Generated by CI" > local.properties
          fi

      - name: Decode release keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 -d > vocalis-release.jks

      - name: Build signed release APKs
        env:
          VOCALIS_STORE_FILE: vocalis-release.jks
          VOCALIS_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          VOCALIS_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          VOCALIS_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease :wear:assembleRelease --no-daemon --stacktrace

      - name: Collect APKs
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk dist/vocalis-phone.apk
          cp wear/build/outputs/apk/release/wear-release.apk dist/vocalis-watch.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: vocalis-apks
          path: dist/*.apk
          if-no-files-found: error

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.apk
          generate_release_notes: true
